<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Créditos</title>
</head>
<body>

<header>
  <h1>Sistema Básico de Créditos</h1>
   <link rel="stylesheet" href="simulador_completo.css">
</header>

<nav>
  <button onclick="mostrarSeccion('parametros')">Parámetros</button>
  <button onclick="mostrarSeccion('clientes')" >Clientes</button>
  <button onclick="mostrarSeccion('credito')" >Creditos</button>
</nav>

<section id="parametros">
  <h2>Configurar Parámetros</h2>

  <label>Tasa de interés:</label>
  <input type="number" id="tasaInteres" min="10" max="20" value="15">
  <span>%</span>

  <br>
  <button onclick="guardarTasa()">Guardar tasa</button>

  <p id="mensajeTasa"></p>
</section>

<section id="credito">
  <h2>Solicitar Crédito</h2>

  <input type="text" id="buscarCedulaCredito">
  <button onclick="buscarClienteCredito()">Buscar cliente</button>

  <div id="datosClienteCredito" class="card"></div>

  <input type="number" id="montoCredito" placeholder="Monto">
<div id="errorMonto" style="color: red; font-size: 12px;"></div> 

<input type="number" id="plazoCredito" placeholder="Plazo">
<div id="errorPlazo" style="color: red; font-size: 12px;"></div> 

  <br>

  <button onclick="calcularCredito()">Calcular crédito</button>

  <div id="resultadoCredito"></div>

  <button id="btnSolicitarCredito" onclick="solicitarCredito()" disabled>
    Solicitar crédito
  </button>
</section>

<section id="clientes">
  <h2>Registro de Clientes</h2>

  <input id="idCedula" placeholder="Cedula" type="text" >
  <input id="idNombre" placeholder="Nombre" type="text" >
  <input id="idApellido" placeholder="Apellido" type="text" >
  <input id="idIngresos" placeholder="Ingresos" type="number" >
  <input id="idEgresos" placeholder="Egresos" type="number" >

  <br>

  <button onclick="guardarClientes()" >Guardar cliente</button>
  <button onclick="limpiar()">Limpiar</button>

  <table>
    <thead>
      <tr>
        <th>Cédula</th>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Ingresos</th>
        <th>Egresos</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tablaClientes">
      
    </tbody>
  </table>
</section>



<script src="simulador_completo.js"></script>
<script src="utilitarios.js"></script>
</body>
</html>
